<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PostGuard — Security Agency Platform</title>
    <meta name="description" content="PostGuard is a SaaS security agency management platform for lords, admins, and supervisors." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red;padding:20px;z-index:99999;position:fixed;top:0;left:0;background:white;width:100%;font-size:20px;box-sizing:border-box;"><b>Runtime Error:</b><br/>' + e.message + '<br/><pre>' + (e.error ? e.error.stack : '') + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red;padding:20px;z-index:99999;position:fixed;top:0;left:0;background:white;width:100%;font-size:20px;box-sizing:border-box;"><b>Unhandled Promise Rejection:</b><br/>' + e.reason + '</div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
